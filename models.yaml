# =============================================================================
# Model & Collection Registry — Fully Data-Driven
# =============================================================================
#
# Loaded at module-import time by src/config/collections.py.
# =============================================================================

# ---------------------------------------------------------------------------
# Model Capability Registry
# ---------------------------------------------------------------------------
model_specs:
  jinaai/jina-embeddings-v3-ctx1024:
    base_model: jinaai/jina-embeddings-v3
    max_context_tokens: 1024
    overlap_tokens: 128
    embed_dim: 768
    supports_late_chunking: true
    description: "Jina v3: 1024 context, late chunking, 768 output dimension."

  Alibaba-NLP/gte-Qwen2-1.5B-instruct-ctx1024:
    base_model: Alibaba-NLP/gte-Qwen2-1.5B-instruct
    max_context_tokens: 1024
    overlap_tokens: 128
    embed_dim: 768
    supports_late_chunking: true
    description: "GTE-Qwen2-1.5B: 1024 context, sliced to 768 dimensions."

# ---------------------------------------------------------------------------
# Collection Registry
# ---------------------------------------------------------------------------
collections:
  tutanaklar_ctx1024:
    collection_name: tutanaklar_ctx1024
    chroma_path: data_lake/tutanaklar_ctx1024
    embed_model: jinaai/jina-embeddings-v3-ctx1024
    doc_type: tutanak
    min_chunk_chars: 400
    max_chunk_chars: 1500
    max_chunk_tokens: 512
    min_chunk_tokens: 384

  tutanaklar_qwen_ctx1024:
    collection_name: tutanaklar_qwen_ctx1024
    chroma_path: data_lake/tutanaklar_qwen_ctx1024
    embed_model: Alibaba-NLP/gte-Qwen2-1.5B-instruct-ctx1024
    doc_type: tutanak
    min_chunk_chars: 400
    max_chunk_chars: 1500
    max_chunk_tokens: 512
    min_chunk_tokens: 384

defaults:
  tutanak: tutanaklar_ctx1024
